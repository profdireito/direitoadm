<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel do Professor — Direito Administrativo</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gd:#0F5132;--gm:#1A7A4A;--gl:#2EAD6B;--gp:#D6F0E3;--gf:#F0FAF5;
  --am:#B45309;--ap:#FEF3C7;--bl:#1D4ED8;--bp:#EFF6FF;
  --co:#9A3412;--cp:#FFF1EE;
  --tx:#1C2B22;--ts:#4B6358;--tm:#7A9B8A;
  --bd:#C8E0D4;--bg:#F8FBF9;--wh:#FFFFFF;
  --sh:0 2px 12px rgba(15,81,50,0.08);
}
body{font-family:'Source Sans 3',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}

/* LOGIN */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1rem}
.login-box{background:var(--wh);border:1px solid var(--bd);border-radius:16px;padding:2.5rem 2rem;width:100%;max-width:380px;box-shadow:var(--sh);text-align:center}
.login-box .ico{font-size:2.5rem;margin-bottom:1rem}
.login-box h1{font-family:'Lora',serif;font-size:20px;font-weight:600;color:var(--gd);margin-bottom:6px}
.login-box p{font-size:13px;color:var(--tm);margin-bottom:1.5rem}
.login-box input{width:100%;padding:10px 14px;border:1.5px solid var(--bd);border-radius:10px;font-size:14px;font-family:'Source Sans 3',sans-serif;background:var(--bg);color:var(--tx);margin-bottom:10px}
.login-box input:focus{outline:none;border-color:var(--gl)}
.login-btn{width:100%;padding:11px;background:var(--gd);color:white;border:none;border-radius:10px;font-size:14px;font-weight:600;font-family:'Source Sans 3',sans-serif;cursor:pointer;transition:background 0.2s}
.login-btn:hover{background:var(--gm)}
.login-err{font-size:12px;color:#DC2626;margin-top:8px;display:none}

/* MAIN */
#main-screen{display:none}
header{background:var(--gd);color:white;padding:1.5rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.hdr-left h1{font-family:'Lora',serif;font-size:20px;font-weight:600}
.hdr-left p{font-size:12px;color:rgba(255,255,255,0.6);margin-top:2px}
.hdr-right{display:flex;gap:8px;flex-wrap:wrap}
.hdr-btn{padding:7px 14px;font-size:12px;font-weight:600;font-family:'Source Sans 3',sans-serif;border-radius:8px;cursor:pointer;transition:all 0.2s;border:1px solid rgba(255,255,255,0.3);color:white;background:rgba(255,255,255,0.1)}
.hdr-btn:hover{background:rgba(255,255,255,0.2)}
.hdr-btn.danger{border-color:rgba(220,38,38,0.5);color:#FCA5A5}
.hdr-btn.danger:hover{background:rgba(220,38,38,0.2)}

main{max-width:960px;margin:0 auto;padding:1.5rem 1.25rem 4rem}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:1.5rem}
.stat-card{background:var(--wh);border:1px solid var(--bd);border-radius:12px;padding:1rem;text-align:center;box-shadow:var(--sh)}
.stat-card .num{font-size:28px;font-weight:600;color:var(--gd)}
.stat-card .lbl{font-size:12px;color:var(--tm);margin-top:2px}

/* TURMA TOGGLE */
.turma-bar{display:flex;gap:8px;margin-bottom:1.25rem;flex-wrap:wrap;align-items:center}
.turma-bar label{font-size:13px;font-weight:600;color:var(--ts)}
.turma-btn{padding:6px 14px;font-size:12px;font-weight:600;font-family:'Source Sans 3',sans-serif;border:1.5px solid var(--bd);border-radius:20px;background:transparent;color:var(--ts);cursor:pointer;transition:all 0.2s}
.turma-btn.active{background:var(--gd);border-color:var(--gd);color:white}

/* SEARCH */
.search-wrap{margin-bottom:1rem}
.search-wrap input{width:100%;padding:9px 14px;border:1.5px solid var(--bd);border-radius:10px;font-size:13.5px;font-family:'Source Sans 3',sans-serif;background:var(--bg);color:var(--tx)}
.search-wrap input:focus{outline:none;border-color:var(--gl)}

/* STUDENT CARDS */
.student-card{background:var(--wh);border:1px solid var(--bd);border-radius:14px;margin-bottom:1rem;box-shadow:var(--sh);overflow:hidden}
.sc-header{display:flex;align-items:center;gap:14px;padding:1rem 1.25rem;cursor:pointer;transition:background 0.15s;user-select:none}
.sc-header:hover{background:var(--gf)}
.sc-avatar{width:40px;height:40px;border-radius:50%;background:var(--gd);color:white;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0}
.sc-info{flex:1}
.sc-name{font-size:15px;font-weight:600;color:var(--tx)}
.sc-meta{font-size:12px;color:var(--tm);margin-top:2px}
.sc-score{display:flex;align-items:center;gap:8px}
.score-pill{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700}
.score-green{background:var(--gp);color:var(--gd)}
.score-amber{background:var(--ap);color:var(--am)}
.score-red{background:var(--cp);color:var(--co)}
.sc-chevron{font-size:16px;color:var(--tm);transition:transform 0.2s}
.sc-chevron.open{transform:rotate(180deg)}

.sc-body{display:none;border-top:1px solid var(--bd);padding:1.25rem}
.sc-body.open{display:block}

.sc-section-title{font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--gm);margin:1rem 0 0.5rem}
.sc-section-title:first-child{margin-top:0}

.mc-row{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--bd);font-size:13px}
.mc-row:last-child{border-bottom:none}
.mc-num{flex-shrink:0;width:24px;height:24px;border-radius:50%;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center}
.mc-ok{background:var(--gp);color:var(--gd)}
.mc-err{background:var(--cp);color:var(--co)}
.mc-q{flex:1;color:var(--ts);line-height:1.5}
.mc-chosen{font-size:12px;color:var(--tm);margin-top:2px}

.diss-item{margin-bottom:1rem;padding:12px 14px;background:var(--bg);border:1px solid var(--bd);border-radius:10px}
.diss-q{font-size:13px;font-weight:600;color:var(--tx);margin-bottom:6px;line-height:1.5}
.diss-r{font-size:13px;color:var(--ts);line-height:1.6;white-space:pre-wrap}
.diss-empty{font-size:13px;color:var(--tm);font-style:italic}

.weak-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.weak-tag{background:var(--cp);color:var(--co);font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px}
.ok-tag{background:var(--gp);color:var(--gd);font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px}

/* EMPTY */
.empty{text-align:center;padding:3rem 1rem;color:var(--tm)}
.empty .ico{font-size:2.5rem;margin-bottom:0.75rem}
.empty p{font-size:14px}

footer{text-align:center;padding:1.5rem;font-size:12px;color:var(--tm);border-top:1px solid var(--bd)}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="ico">🔐</div>
    <h1>Painel do Professor</h1>
    <p>Noções de Direito Administrativo<br>Colégio Excelência</p>
    <input type="password" id="pwd-input" placeholder="Senha de acesso" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">Entrar</button>
    <div class="login-err" id="login-err">Senha incorreta. Tente novamente.</div>
  </div>
</div>

<!-- MAIN -->
<div id="main-screen">
  <header>
    <div class="hdr-left">
      <h1>Painel do Professor</h1>
      <p>Prof. Esp. Caio Filipe Duarte Araújo · Noções de Direito Administrativo</p>
    </div>
    <div class="hdr-right">
      <button class="hdr-btn" onclick="exportCSV()">⬇ Exportar CSV</button>
      <button class="hdr-btn danger" onclick="confirmClear()">🗑 Limpar dados</button>
      <button class="hdr-btn" onclick="doLogout()">Sair</button>
    </div>
  </header>

  <main>
    <div class="stats-grid" id="stats-grid"></div>

    <div class="turma-bar">
      <label>Turma:</label>
      <button class="turma-btn active" onclick="filterTurma('todas',this)">Todas</button>
      <button class="turma-btn" onclick="filterTurma('Vespertino',this)">Vespertino</button>
      <button class="turma-btn" onclick="filterTurma('Noturno',this)">Noturno</button>
    </div>

    <div class="search-wrap">
      <input type="text" id="search" placeholder="Buscar aluno pelo nome..." oninput="renderList()">
    </div>

    <div id="student-list"></div>
  </main>

  <footer>Painel do Professor · Colégio Excelência · Direito Administrativo</footer>
</div>

<script>
const PASS = 'excelencia2025';
const STORE_KEY = 'dadm_respostas';
let turmaFilter = 'todas';

function doLogin(){
  const v = document.getElementById('pwd-input').value;
  if(v === PASS){
    document.getElementById('login-screen').style.display='none';
    document.getElementById('main-screen').style.display='block';
    renderAll();
  } else {
    document.getElementById('login-err').style.display='block';
    document.getElementById('pwd-input').value='';
  }
}
function doLogout(){
  document.getElementById('main-screen').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('pwd-input').value='';
}

function getData(){
  try{ return JSON.parse(localStorage.getItem(STORE_KEY)||'[]'); }
  catch(e){ return []; }
}

function filterTurma(t,btn){
  turmaFilter=t;
  document.querySelectorAll('.turma-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
  renderStats();
}

function getFiltered(){
  const data=getData();
  const q=(document.getElementById('search')?.value||'').toLowerCase();
  return data.filter(r=>{
    const turmaOk = turmaFilter==='todas' || (r.turma||'').toLowerCase()===turmaFilter.toLowerCase();
    const nameOk = r.nome.toLowerCase().includes(q);
    return turmaOk && nameOk;
  });
}

function initials(name){
  return name.trim().split(' ').filter(Boolean).slice(0,2).map(w=>w[0].toUpperCase()).join('');
}

function scorePill(pct){
  const cls = pct>=70?'score-green':pct>=50?'score-amber':'score-red';
  return `<span class="score-pill ${cls}">${pct}%</span>`;
}

function renderStats(){
  const data=getData();
  const filtered = turmaFilter==='todas'?data:data.filter(r=>(r.turma||'').toLowerCase()===turmaFilter.toLowerCase());
  const total=filtered.length;
  const avg = total ? Math.round(filtered.reduce((s,r)=>s+(r.placar||0),0)/total) : 0;
  const above70 = filtered.filter(r=>(r.placar||0)>=70).length;
  const below50 = filtered.filter(r=>(r.placar||0)<50).length;
  const grid = document.getElementById('stats-grid');
  grid.innerHTML=`
    <div class="stat-card"><div class="num">${total}</div><div class="lbl">alunos responderam</div></div>
    <div class="stat-card"><div class="num">${avg}%</div><div class="lbl">média da turma</div></div>
    <div class="stat-card"><div class="num" style="color:var(--gd)">${above70}</div><div class="lbl">acima de 70%</div></div>
    <div class="stat-card"><div class="num" style="color:var(--co)">${below50}</div><div class="lbl">abaixo de 50%</div></div>
  `;
}

function renderList(){
  const list=document.getElementById('student-list');
  const filtered=getFiltered();
  if(!filtered.length){
    list.innerHTML=`<div class="empty"><div class="ico">📭</div><p>Nenhum aluno encontrado.</p></div>`;
    return;
  }
  // sort by name
  filtered.sort((a,b)=>a.nome.localeCompare(b.nome,'pt'));
  list.innerHTML='';
  filtered.forEach((r,idx)=>{
    const pct=r.placar||0;
    const acertos=r.acertos||0;
    const total=r.totalQuestoes||15;
    const card=document.createElement('div');
    card.className='student-card';
    const turmaStr=r.turma?` · ${r.turma}`:'';
    const dtStr=r.dataHora?new Date(r.dataHora).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'}):'';

    // MC rows
    let mcRows='';
    if(r.respostasMC && r.respostasMC.length){
      r.respostasMC.forEach((mc,i)=>{
        const cls=mc.correto?'mc-ok':'mc-err';
        const icon=mc.correto?'✓':'✗';
        mcRows+=`<div class="mc-row">
          <div class="mc-num ${cls}">${icon}</div>
          <div class="mc-q">${mc.enunciado}
            <div class="mc-chosen">${mc.correto?'Acertou':'Errou'} — escolheu: ${mc.escolhida}</div>
          </div>
        </div>`;
      });
    } else {
      mcRows='<p style="font-size:13px;color:var(--tm);font-style:italic">Questões não respondidas.</p>';
    }

    // Dissertativas
    let dissRows='';
    if(r.dissertativas && r.dissertativas.length){
      r.dissertativas.forEach((d,i)=>{
        const resp=d.resposta&&d.resposta.trim()?`<div class="diss-r">${d.resposta}</div>`:`<div class="diss-empty">Não respondida</div>`;
        dissRows+=`<div class="diss-item"><div class="diss-q">Q${i+1}: ${d.enunciado}</div>${resp}</div>`;
      });
    } else {
      dissRows='<p style="font-size:13px;color:var(--tm);font-style:italic">Nenhuma dissertativa enviada.</p>';
    }

    // Weak/strong topics
    let weakHtml='', okHtml='';
    if(r.temasFragos && r.temasFragos.length){
      weakHtml=r.temasFragos.map(t=>`<span class="weak-tag">${t}</span>`).join('');
    }
    if(r.temasOk && r.temasOk.length){
      okHtml=r.temasOk.map(t=>`<span class="ok-tag">${t}</span>`).join('');
    }

    card.innerHTML=`
      <div class="sc-header" onclick="toggleCard(${idx})">
        <div class="sc-avatar">${initials(r.nome)}</div>
        <div class="sc-info">
          <div class="sc-name">${r.nome}</div>
          <div class="sc-meta">${dtStr}${turmaStr}</div>
        </div>
        <div class="sc-score">
          ${scorePill(pct)}
          <span style="font-size:13px;color:var(--tm)">${acertos}/${total}</span>
        </div>
        <div class="sc-chevron" id="chev-${idx}">▼</div>
      </div>
      <div class="sc-body" id="body-${idx}">
        ${weakHtml?`<div class="sc-section-title">Temas que precisa estudar mais</div><div class="weak-list">${weakHtml}</div>`:''}
        ${okHtml?`<div class="sc-section-title">Temas que domina</div><div class="weak-list">${okHtml}</div>`:''}
        <div class="sc-section-title">Múltipla Escolha (${acertos}/${total} acertos)</div>
        ${mcRows}
        <div class="sc-section-title">Questões Dissertativas</div>
        ${dissRows}
      </div>
    `;
    list.appendChild(card);
  });
}

function toggleCard(idx){
  const body=document.getElementById('body-'+idx);
  const chev=document.getElementById('chev-'+idx);
  body.classList.toggle('open');
  chev.classList.toggle('open');
}

function renderAll(){
  renderStats();
  renderList();
}

function exportCSV(){
  const data=getData();
  if(!data.length){alert('Nenhum dado para exportar.');return;}
  const rows=[['Nome','Turma','Data/Hora','Placar (%)','Acertos','Total','Temas Fracos','Temas OK']];
  data.forEach(r=>{
    rows.push([
      r.nome,r.turma||'',
      r.dataHora?new Date(r.dataHora).toLocaleString('pt-BR'):'',
      r.placar||0,r.acertos||0,r.totalQuestoes||15,
      (r.temasFragos||[]).join(' | '),
      (r.temasOk||[]).join(' | ')
    ]);
  });
  const csv=rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);
  a.download='respostas_direito_adm.csv';
  a.click();
}

function confirmClear(){
  if(confirm('Tem certeza que deseja apagar TODOS os dados dos alunos? Essa ação não pode ser desfeita.')){
    localStorage.removeItem(STORE_KEY);
    renderAll();
  }
}

// Auto-refresh every 30s
setInterval(()=>{ if(document.getElementById('main-screen').style.display!=='none') renderAll(); },30000);
</script>
</body>
</html>
